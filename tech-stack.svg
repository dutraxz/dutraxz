<svg width="480" height="392" viewBox="0 0 480 392" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

      .bar { animation: grow 1.4s cubic-bezier(0.22,1,0.36,1) forwards; transform-origin: left; }
      .bar-java      { animation-delay: 0.3s; }
      .bar-spring    { animation-delay: 0.5s; }
      .bar-maven     { animation-delay: 0.7s; }
      .bar-hibernate { animation-delay: 0.9s; }
      .bar-jpa       { animation-delay: 1.1s; }
      .bar-mysql     { animation-delay: 1.3s; }

      @keyframes grow {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }

      .item { animation: fadeIn 0.5s ease forwards; opacity: 0; }
      .item-1 { animation-delay: 0.2s; }
      .item-2 { animation-delay: 0.4s; }
      .item-3 { animation-delay: 0.6s; }
      .item-4 { animation-delay: 0.8s; }
      .item-5 { animation-delay: 1.0s; }
      .item-6 { animation-delay: 1.2s; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .scan { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(0px);   opacity: 0.8; }
        85%  { opacity: 0.6; }
        100% { transform: translateY(392px); opacity: 0; }
      }

      .dot { animation: blink 2s ease-in-out infinite; }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.3; }
      }

      .glow-java      { animation: glowJ  2s ease-in-out infinite 1.7s; }
      .glow-spring    { animation: glowS  2s ease-in-out infinite 1.9s; }
      .glow-maven     { animation: glowM  2s ease-in-out infinite 2.1s; }
      .glow-hibernate { animation: glowH  2s ease-in-out infinite 2.3s; }
      .glow-jpa       { animation: glowJp 2s ease-in-out infinite 2.5s; }
      .glow-mysql     { animation: glowMy 2s ease-in-out infinite 2.7s; }

      @keyframes glowJ  { 0%,100%{filter:drop-shadow(0 0 3px #f89820)} 50%{filter:drop-shadow(0 0 7px #f89820)} }
      @keyframes glowS  { 0%,100%{filter:drop-shadow(0 0 3px #6db33f)} 50%{filter:drop-shadow(0 0 7px #6db33f)} }
      @keyframes glowM  { 0%,100%{filter:drop-shadow(0 0 3px #c71a36)} 50%{filter:drop-shadow(0 0 7px #c71a36)} }
      @keyframes glowH  { 0%,100%{filter:drop-shadow(0 0 3px #8aabb8)} 50%{filter:drop-shadow(0 0 7px #8aabb8)} }
      @keyframes glowJp { 0%,100%{filter:drop-shadow(0 0 3px #0098ff)} 50%{filter:drop-shadow(0 0 7px #0098ff)} }
      @keyframes glowMy { 0%,100%{filter:drop-shadow(0 0 3px #00aec7)} 50%{filter:drop-shadow(0 0 7px #00aec7)} }
    </style>

    <filter id="cornerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip-java">      <rect x="0" y="0" width="368" height="6" rx="2"/></clipPath>
    <clipPath id="clip-spring">    <rect x="0" y="0" width="320" height="6" rx="2"/></clipPath>
    <clipPath id="clip-maven">     <rect x="0" y="0" width="300" height="6" rx="2"/></clipPath>
    <clipPath id="clip-hibernate"> <rect x="0" y="0" width="288" height="6" rx="2"/></clipPath>
    <clipPath id="clip-jpa">       <rect x="0" y="0" width="280" height="6" rx="2"/></clipPath>
    <clipPath id="clip-mysql">     <rect x="0" y="0" width="268" height="6" rx="2"/></clipPath>

    <linearGradient id="grad-java" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b35c00"/>
      <stop offset="100%" stop-color="#f89820"/>
    </linearGradient>
    <linearGradient id="grad-spring" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2d6a2d"/>
      <stop offset="100%" stop-color="#6db33f"/>
    </linearGradient>
    <linearGradient id="grad-maven" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#c71a36"/>
    </linearGradient>
    <linearGradient id="grad-hibernate" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2e3d4f"/>
      <stop offset="100%" stop-color="#8aabb8"/>
    </linearGradient>
    <linearGradient id="grad-jpa" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#003d6b"/>
      <stop offset="100%" stop-color="#0098ff"/>
    </linearGradient>
    <linearGradient id="grad-mysql" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#004d5e"/>
      <stop offset="100%" stop-color="#00aec7"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#080d14"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="50%"  stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="392" rx="4" fill="url(#bg-grad)"/>
  <rect width="480" height="392" rx="4" fill="none" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Corner accents -->
  <g filter="url(#cornerGlow)" stroke="#00c8ff" stroke-width="2" fill="none">
    <polyline points="1,14 1,1 14,1"/>
    <polyline points="466,1 479,1 479,14"/>
    <polyline points="479,378 479,391 466,391"/>
    <polyline points="14,391 1,391 1,378"/>
  </g>

  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="480" height="2" rx="1" fill="url(#scanGrad)" opacity="0.4"/>

  <!-- Header -->
  <line x1="32" y1="58" x2="448" y2="58" stroke="#0e1e2e" stroke-width="1"/>
  <circle class="dot" cx="40" cy="36" r="4" fill="#00c8ff"/>
  <circle cx="40" cy="36" r="4" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.3"/>
  <text x="52" y="41" font-family="'Orbitron', monospace" font-size="11" font-weight="700"
        fill="#00c8ff" letter-spacing="3">TECH STACK</text>
  <text x="448" y="41" font-family="'Share Tech Mono', monospace" font-size="9"
        fill="#1e3a50" letter-spacing="1.5" text-anchor="end">BACK-END · JAVA ECOSYSTEM</text>

  <!-- ═══ JAVA ═══ -->
  <g class="item item-1">
    <rect x="32" y="72" width="22" height="22" rx="3" fill="rgba(248,152,32,0.08)"/>
    <text x="43" y="87" font-size="12" text-anchor="middle">☕</text>
    <text x="62" y="82" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">JAVA</text>
    <text x="62" y="92" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">linguagem principal</text>
    <text x="448" y="83" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#f89820" text-anchor="end" class="glow-java">92%</text>
    <rect x="32" y="100" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-java)" transform="translate(32,100)">
      <rect class="bar bar-java" width="368" height="6" rx="2" fill="url(#grad-java)" opacity="0"/>
    </g>
    <rect class="bar bar-java" x="396" y="100" width="4" height="6" rx="2"
          fill="#f89820" opacity="0" filter="url(#cornerGlow)"/>
  </g>

  <!-- ═══ SPRING ═══ -->
  <g class="item item-2">
    <rect x="32" y="124" width="22" height="22" rx="3" fill="rgba(109,179,63,0.08)"/>
    <text x="43" y="139" font-size="12" text-anchor="middle">🌿</text>
    <text x="62" y="134" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">SPRING</text>
    <text x="62" y="144" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">framework web &amp; boot</text>
    <text x="448" y="135" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#6db33f" text-anchor="end" class="glow-spring">80%</text>
    <rect x="32" y="152" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-spring)" transform="translate(32,152)">
      <rect class="bar bar-spring" width="320" height="6" rx="2" fill="url(#grad-spring)" opacity="0"/>
    </g>
    <rect class="bar bar-spring" x="348" y="152" width="4" height="6" rx="2"
          fill="#6db33f" opacity="0" filter="url(#cornerGlow)"/>
  </g>

  <!-- ═══ MAVEN ═══ -->
  <g class="item item-3">
    <rect x="32" y="176" width="22" height="22" rx="3" fill="rgba(199,26,54,0.08)"/>
    <text x="43" y="191" font-size="12" text-anchor="middle">📦</text>
    <text x="62" y="186" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">MAVEN</text>
    <text x="62" y="196" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">build &amp; dependências</text>
    <text x="448" y="187" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#c71a36" text-anchor="end" class="glow-maven">75%</text>
    <rect x="32" y="204" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-maven)" transform="translate(32,204)">
      <rect class="bar bar-maven" width="300" height="6" rx="2" fill="url(#grad-maven)" opacity="0"/>
    </g>
  </g>

  <!-- ═══ HIBERNATE ═══ -->
  <g class="item item-4">
    <rect x="32" y="228" width="22" height="22" rx="3" fill="rgba(138,171,184,0.08)"/>
    <text x="43" y="243" font-size="12" text-anchor="middle">🐘</text>
    <text x="62" y="238" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">HIBERNATE</text>
    <text x="62" y="248" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">orm &amp; mapeamento</text>
    <text x="448" y="239" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#8aabb8" text-anchor="end" class="glow-hibernate">72%</text>
    <rect x="32" y="256" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-hibernate)" transform="translate(32,256)">
      <rect class="bar bar-hibernate" width="288" height="6" rx="2" fill="url(#grad-hibernate)" opacity="0"/>
    </g>
  </g>

  <!-- ═══ JPA ═══ -->
  <g class="item item-5">
    <rect x="32" y="280" width="22" height="22" rx="3" fill="rgba(0,152,255,0.08)"/>
    <text x="43" y="295" font-size="12" text-anchor="middle">🗄️</text>
    <text x="62" y="290" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">JPA</text>
    <text x="62" y="300" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">persistência de dados</text>
    <text x="448" y="291" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#0098ff" text-anchor="end" class="glow-jpa">70%</text>
    <rect x="32" y="308" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-jpa)" transform="translate(32,308)">
      <rect class="bar bar-jpa" width="280" height="6" rx="2" fill="url(#grad-jpa)" opacity="0"/>
    </g>
  </g>

  <!-- ═══ MYSQL ═══ -->
  <g class="item item-6">
    <rect x="32" y="332" width="22" height="22" rx="3" fill="rgba(0,174,199,0.08)"/>
    <text x="43" y="347" font-size="12" text-anchor="middle">🐬</text>
    <text x="62" y="342" font-family="'Orbitron', monospace" font-size="10" font-weight="700"
          fill="#c8e0f0" letter-spacing="2">MYSQL</text>
    <text x="62" y="352" font-family="'Share Tech Mono', monospace" font-size="8"
          fill="#1e3a50" letter-spacing="1">banco de dados relacional</text>
    <text x="448" y="343" font-family="'Orbitron', monospace" font-size="11" font-weight="900"
          fill="#00aec7" text-anchor="end" class="glow-mysql">67%</text>
    <rect x="32" y="360" width="400" height="6" rx="2" fill="#0a1520"/>
    <g clip-path="url(#clip-mysql)" transform="translate(32,360)">
      <rect class="bar bar-mysql" width="268" height="6" rx="2" fill="url(#grad-mysql)" opacity="0"/>
    </g>
  </g>

  <!-- Footer -->
  <line x1="32" y1="378" x2="448" y2="378" stroke="#0e1e2e" stroke-width="1"/>
  <text x="32" y="389" font-family="'Share Tech Mono', monospace" font-size="8.5"
        fill="#1a3040" letter-spacing="1.5">VICTOR DUTRA · BACK-END DEVELOPER</text>
  <text x="448" y="389" font-family="'Share Tech Mono', monospace" font-size="8.5"
        fill="#00c8ff" letter-spacing="1" text-anchor="end" opacity="0.4">▸ ACTIVE LEARNING</text>
</svg>
